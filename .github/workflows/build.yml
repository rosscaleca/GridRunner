name: Build GridRunner

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install .[dev]
      - name: Run tests
        run: pytest -v

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: GridRunner-macOS
            build_script: bash build/build_macos.sh
            dist_path: dist/macos
          - os: windows-latest
            artifact: GridRunner-Windows
            build_script: build\build_windows.bat
            dist_path: dist/windows
          - os: ubuntu-latest
            artifact: GridRunner-Linux
            build_script: bash build/build_linux.sh
            dist_path: dist/linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev

      - name: Build
        run: ${{ matrix.build_script }}

      - name: Create release archive (macOS)
        if: runner.os == 'macOS'
        run: cd dist/macos && zip -r --symlinks ../../GridRunner-macOS.zip GridRunner.app

      - name: Create release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/windows/* -DestinationPath GridRunner-Windows.zip

      - name: Create release archive (Linux)
        if: runner.os == 'Linux'
        run: cd dist/linux && zip -r ../../GridRunner-Linux.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: GridRunner-*.zip
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect zips
        run: find artifacts -name '*.zip' -exec mv {} . \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
